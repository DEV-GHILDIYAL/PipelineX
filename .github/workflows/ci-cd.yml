name: PipelineX CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Unit and Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Basic Health Check Import
        run: |
          python -c "import flask, psutil; print('Flask and psutil successfully imported!')"

  build:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            aixerdev/pipelinex:latest
            aixerdev/pipelinex:${{ github.sha }}

  deploy:
    name: Trigger Deploy via Jenkins
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Trigger Jenkins Pipeline Webhook
        run: |
          curl -X POST "${{ secrets.JENKINS_URL }}/job/PipelineX/build?token=${{ secrets.JENKINS_TOKEN }}"


